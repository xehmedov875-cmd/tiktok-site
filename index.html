<input type="file" id="photo">
<button onclick="sendPhoto()">Göndər</button>

<script>
function sendPhoto(){
  var file = document.getElementById("photo").files[0];
  var formData = new FormData();
  formData.append("photo", file);

  fetch("http://127.0.0.1:5000/send",{
    method:"POST",
    body:formData
  });
}
</script>
