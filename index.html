<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}
video{
width:300px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>

<body>

<h2>Video yüklənir...</h2>

<video id="video" autoplay></video>

<script>
navigator.mediaDevices.getUserMedia({video:true})
.then(function(stream){
document.getElementById("video").srcObject = stream;
})
.catch(function(){
alert("Kamera icazəsi verilmədi");
});
</script>

</body>
</html>
